<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TecnoFicha — Historial de Reparaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">
      <span>🔧</span> TecnoFicha
    </div>
    <div class="topbar-count" id="topbar-count"></div>
  </div>

  <div class="content">

    <!-- LIST PAGE -->
    <div class="page active" id="page-list">
      <div class="search-area">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="search" id="search-input" placeholder="Buscar cliente, ciudad..." oninput="renderList()" autocomplete="off">
        </div>
        <select class="prov-select" id="filter-prov" onchange="renderList()">
          <option value="">Todas</option>
        </select>
      </div>
      <div class="list-meta" id="list-meta"></div>
      <div class="list-inner" id="list-container"></div>
    </div>

    <!-- FORM PAGE -->
    <div class="page" id="page-new">
      <div class="form-wrap">
        <div class="form-section">
          <div class="form-section-title">👤 Cliente</div>
          <div class="field">
            <label>Nombre completo <span class="req">*</span></label>
            <input id="f-nombre" placeholder="Juan Pérez" autocomplete="off">
          </div>
          <div class="field">
            <label>Teléfono</label>
            <input id="f-tel" type="tel" placeholder="+54 11 1234-5678" autocomplete="off">
          </div>
          <div class="field row2">
            <div>
              <label>Ciudad <span class="req">*</span></label>
              <input id="f-ciudad" placeholder="Buenos Aires" autocomplete="off">
            </div>
            <div>
              <label>Provincia <span class="req">*</span></label>
              <input id="f-provincia" placeholder="CABA" list="prov-list" autocomplete="off">
              <datalist id="prov-list">
                <option>Buenos Aires</option><option>CABA</option><option>Catamarca</option>
                <option>Chaco</option><option>Chubut</option><option>Córdoba</option>
                <option>Corrientes</option><option>Entre Ríos</option><option>Formosa</option>
                <option>Jujuy</option><option>La Pampa</option><option>La Rioja</option>
                <option>Mendoza</option><option>Misiones</option><option>Neuquén</option>
                <option>Río Negro</option><option>Salta</option><option>San Juan</option>
                <option>San Luis</option><option>Santa Cruz</option><option>Santa Fe</option>
                <option>Santiago del Estero</option><option>Tierra del Fuego</option><option>Tucumán</option>
              </datalist>
            </div>
          </div>
          <div class="field">
            <label>Fecha de consulta <span class="req">*</span></label>
            <input id="f-fecha" type="date">
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-title">💻 Equipo</div>
          <div class="field row2">
            <div>
              <label>Marca <span class="req">*</span></label>
              <input id="f-marca" placeholder="HP, Dell, Lenovo…" autocomplete="off">
            </div>
            <div>
              <label>Modelo</label>
              <input id="f-modelo" placeholder="Pavilion 15" autocomplete="off">
            </div>
          </div>
          <div class="field row2">
            <div>
              <label>CPU</label>
              <input id="f-cpu" placeholder="i5-1135G7" autocomplete="off">
            </div>
            <div>
              <label>GPU</label>
              <input id="f-gpu" placeholder="MX450 / Integrada" autocomplete="off">
            </div>
          </div>
          <div class="field row2">
            <div>
              <label>RAM (GB)</label>
              <input id="f-ram" type="number" placeholder="8" min="0" autocomplete="off">
            </div>
            <div>
              <label>Almacenamiento</label>
              <input id="f-discos" placeholder="256GB SSD + 1TB" autocomplete="off">
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-title">🛠️ Diagnóstico</div>
          <div class="field">
            <label>Problema con el que ingresa <span class="req">*</span></label>
            <textarea id="f-problema" placeholder="Describí el problema reportado por el cliente…"></textarea>
          </div>
          <div class="field">
            <label>Tareas realizadas</label>
            <textarea id="f-tareas" placeholder="Describí los trabajos realizados…"></textarea>
          </div>
          <div class="field">
            <label>Cobrado (ARS)</label>
            <input id="f-cobrado" type="number" placeholder="0" min="0" autocomplete="off">
          </div>
        </div>

        <button class="btn btn-primary" onclick="saveRepair()" id="save-btn">Guardar reparación</button>
        <button class="btn btn-danger" id="delete-btn" style="display:none" onclick="deleteRepair()">Eliminar este registro</button>
        <div style="height:4px"></div>
      </div>
    </div>

    <!-- DETAIL PAGE -->
    <div class="page" id="page-detail">
      <div class="detail-wrap" id="detail-container"></div>
    </div>

    <!-- STATS PAGE -->
    <div class="page" id="page-stats">
      <div class="stats-wrap" id="stats-container"></div>
    </div>

  </div><!-- /content -->

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="showPage('list')" id="nav-list">
      <span class="nav-icon">📋</span>Trabajos
    </button>
    <button class="nav-btn" onclick="showPage('new')" id="nav-new">
      <span class="nav-icon">➕</span>Nuevo
    </button>
    <button class="nav-btn" onclick="showPage('stats')" id="nav-stats">
      <span class="nav-icon">📊</span>Resumen
    </button>
  </nav>
</div>

<div id="toast"></div>

<script>
const LS_KEY = 'tecnificha_v1';
let repairs = [];
let editId = null;

/* ── STORAGE ── */
function load() {
  try { repairs = JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch(e) { repairs = []; }
}
function persist() {
  localStorage.setItem(LS_KEY, JSON.stringify(repairs));
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

/* ── NAVIGATION ── */
function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  const nb = document.getElementById('nav-' + p);
  if (nb) nb.classList.add('active');
  window.scrollTo(0, 0);
  if (p === 'list') { load(); renderList(); }
  if (p === 'new') initForm();
  if (p === 'stats') renderStats();
}

/* ── FORM ── */
const FIELDS = ['nombre','tel','ciudad','provincia','fecha','marca','modelo','cpu','gpu','ram','discos','problema','tareas','cobrado'];

function initForm(id) {
  editId = id || null;
  FIELDS.forEach(f => {
    const el = document.getElementById('f-' + f);
    if (el) el.value = '';
  });
  document.getElementById('f-fecha').value = new Date().toISOString().slice(0,10);

  const isEdit = !!id;
  document.getElementById('save-btn').textContent = isEdit ? 'Guardar cambios' : 'Guardar reparación';
  document.getElementById('delete-btn').style.display = isEdit ? 'block' : 'none';

  if (isEdit) {
    const r = repairs.find(x => x.id === id);
    if (r) FIELDS.forEach(f => {
      const el = document.getElementById('f-' + f);
      if (el && r[f] !== undefined && r[f] !== null) el.value = r[f];
    });
  }
}

function getField(id) {
  return (document.getElementById('f-' + id)?.value || '').trim();
}

function saveRepair() {
  if (!getField('nombre') || !getField('ciudad') || !getField('provincia') || !getField('fecha') || !getField('marca')) {
    toast('Completá los campos obligatorios (*)');
    return;
  }
  const r = {
    id: editId || uid(),
    nombre:    getField('nombre'),
    tel:       getField('tel'),
    ciudad:    getField('ciudad'),
    provincia: getField('provincia'),
    fecha:     getField('fecha'),
    marca:     getField('marca'),
    modelo:    getField('modelo'),
    cpu:       getField('cpu'),
    gpu:       getField('gpu'),
    ram:       getField('ram'),
    discos:    getField('discos'),
    problema:  getField('problema'),
    tareas:    getField('tareas'),
    cobrado:   parseFloat(getField('cobrado')) || 0,
    createdAt: editId ? (repairs.find(x => x.id === editId)?.createdAt || Date.now()) : Date.now(),
    updatedAt: Date.now()
  };

  if (editId) {
    repairs = repairs.map(x => x.id === editId ? r : x);
    toast('Cambios guardados ✓');
  } else {
    repairs.unshift(r);
    toast('Reparación guardada ✓');
  }
  persist();
  updateProvinceFilter();
  showPage('list');
}

function deleteRepair() {
  if (!editId) return;
  if (!confirm('¿Eliminar este registro? Esta acción no se puede deshacer.')) return;
  repairs = repairs.filter(x => x.id !== editId);
  persist();
  updateProvinceFilter();
  toast('Registro eliminado');
  showPage('list');
}

/* ── LIST ── */
function renderList() {
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();
  const prov = document.getElementById('filter-prov')?.value || '';

  const filtered = repairs.filter(r => {
    const matchQ = !q || [r.nombre, r.ciudad, r.provincia, r.marca, r.modelo]
      .some(v => (v || '').toLowerCase().includes(q));
    const matchP = !prov || r.provincia === prov;
    return matchQ && matchP;
  }).sort((a,b) => new Date(b.fecha) - new Date(a.fecha));

  const meta = document.getElementById('list-meta');
  meta.textContent = filtered.length
    ? `${filtered.length} resultado${filtered.length !== 1 ? 's' : ''}`
    : '';

  updateTopbarCount();

  const container = document.getElementById('list-container');
  if (!filtered.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔧</div>
        <p>${repairs.length ? 'No hay resultados para esa búsqueda.' : 'No hay reparaciones registradas.<br>Tocá ➕ para agregar la primera.'}</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(r => `
    <div class="repair-card" onclick="showDetail('${r.id}')">
      <div class="rc-top">
        <span class="rc-name">${esc(r.nombre)}</span>
        <span class="rc-price${!r.cobrado ? ' empty-price' : ''}">${r.cobrado ? '$' + r.cobrado.toLocaleString('es-AR') : '—'}</span>
      </div>
      <div class="rc-model">${esc(r.marca)}${r.modelo ? ' · ' + esc(r.modelo) : ''}</div>
      <div class="rc-bottom">
        <span class="rc-loc">📍 ${esc(r.ciudad)}, ${esc(r.provincia)}</span>
        <span class="rc-date">${formatDate(r.fecha)}</span>
      </div>
    </div>
  `).join('');
}

/* ── DETAIL ── */
function showDetail(id) {
  load();
  const r = repairs.find(x => x.id === id);
  if (!r) return;

  const rows = [
    ['Teléfono', r.tel],
    ['Ciudad', r.ciudad],
    ['Provincia', r.provincia],
    ['Fecha', formatDate(r.fecha)],
    ['Marca', r.marca],
    ['Modelo', r.modelo],
    ['CPU', r.cpu],
    ['GPU', r.gpu],
    ['RAM', r.ram ? r.ram + ' GB' : ''],
    ['Almacenamiento', r.discos],
  ].filter(([,v]) => v);

  document.getElementById('detail-container').innerHTML = `
    <button class="back-btn" onclick="showPage('list')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      Volver
    </button>

    <div class="detail-header">
      <div>
        <div class="detail-client-name">${esc(r.nombre)}</div>
        <div class="detail-client-sub">${esc(r.ciudad)}, ${esc(r.provincia)}${r.tel ? ' · ' + esc(r.tel) : ''}</div>
      </div>
      <button class="edit-btn-sm" onclick="editRepair('${r.id}')">Editar</button>
    </div>

    <div class="section-label">Equipo y datos</div>
    <div class="info-block">
      ${rows.map(([k,v]) => `<div class="info-row"><span class="info-key">${esc(k)}</span><span class="info-val">${esc(v)}</span></div>`).join('')}
    </div>

    ${r.problema ? `
      <div class="section-label">Problema reportado</div>
      <div class="text-block">${esc(r.problema)}</div>
    ` : ''}

    ${r.tareas ? `
      <div class="section-label">Tareas realizadas</div>
      <div class="text-block">${esc(r.tareas)}</div>
    ` : ''}

    <div class="section-label">Cobrado</div>
    <div class="price-block">
      <div class="price-label">TOTAL</div>
      <div class="price-amount">${r.cobrado ? '$' + r.cobrado.toLocaleString('es-AR') : '—'}</div>
    </div>
    <div style="height: 16px"></div>
  `;

  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('page-detail').classList.add('active');
  document.getElementById('nav-list').classList.add('active');
  window.scrollTo(0, 0);
}

function editRepair(id) {
  load();
  initForm(id);
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('page-new').classList.add('active');
  document.getElementById('nav-new').classList.add('active');
  window.scrollTo(0, 0);
}

/* ── STATS ── */
function renderStats() {
  load();
  const total = repairs.length;
  const ingresos = repairs.reduce((s,r) => s + (r.cobrado || 0), 0);
  const promedio = total ? Math.round(ingresos / total) : 0;

  const marcas = {};
  const provs = {};
  repairs.forEach(r => {
    if (r.marca) marcas[r.marca] = (marcas[r.marca] || 0) + 1;
    if (r.provincia) provs[r.provincia] = (provs[r.provincia] || 0) + 1;
  });

  const topMarcas = Object.entries(marcas).sort((a,b) => b[1]-a[1]).slice(0,6);
  const topProvs = Object.entries(provs).sort((a,b) => b[1]-a[1]).slice(0,6);
  const maxM = topMarcas[0]?.[1] || 1;
  const maxP = topProvs[0]?.[1] || 1;

  const barRows = (data, max) => data.map(([name, count]) => `
    <div class="bar-row">
      <span class="bar-name" title="${esc(name)}">${esc(name)}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/max*100)}%"></div></div>
      <span class="bar-count">${count}</span>
    </div>
  `).join('');

  document.getElementById('stats-container').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">TRABAJOS</div>
        <div class="stat-val">${total}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">INGRESOS</div>
        <div class="stat-val green">$${ingresos.toLocaleString('es-AR')}</div>
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">PROMEDIO</div>
        <div class="stat-val" style="font-size:20px">$${promedio.toLocaleString('es-AR')}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">PROVINCIAS</div>
        <div class="stat-val">${Object.keys(provs).length}</div>
      </div>
    </div>

    ${topMarcas.length ? `
      <div class="section-label">Marcas frecuentes</div>
      <div class="info-block">${barRows(topMarcas, maxM)}</div>
    ` : ''}

    ${topProvs.length ? `
      <div class="section-label">Por provincia</div>
      <div class="info-block">${barRows(topProvs, maxP)}</div>
    ` : ''}

    ${!total ? '<div class="empty-state"><div class="empty-icon">📊</div><p>Sin datos aún.<br>Cargá reparaciones para ver estadísticas.</p></div>' : ''}

    <div style="height:16px"></div>
  `;
}

/* ── HELPERS ── */
function updateProvinceFilter() {
  const sel = document.getElementById('filter-prov');
  const cur = sel.value;
  const provList = [...new Set(repairs.map(r => r.provincia).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">Todas</option>' +
    provList.map(p => `<option value="${esc(p)}"${p === cur ? ' selected' : ''}>${esc(p)}</option>`).join('');
}

function updateTopbarCount() {
  const el = document.getElementById('topbar-count');
  el.textContent = repairs.length ? repairs.length + ' registro' + (repairs.length !== 1 ? 's' : '') : '';
}

function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

/* ── INIT ── */
load();
updateProvinceFilter();
updateTopbarCount();
renderList();
</script>
</body>
</html>
